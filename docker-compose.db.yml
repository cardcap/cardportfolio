# Lokale PostgreSQL-Datenbank für CardCap
# Start:  docker compose -f docker-compose.db.yml up -d
# Stop:   docker compose -f docker-compose.db.yml down
# Reset:  docker compose -f docker-compose.db.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: cardcap-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cardcap
      POSTGRES_PASSWORD: cardcap
      POSTGRES_DB: cardcap
    volumes:
      - cardcap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardcap -d cardcap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cardcap_pgdata:
