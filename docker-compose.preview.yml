services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.preview
    volumes:
      - cardportfolio-db:/app/prisma-data
    expose:
      - "3004"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  cardportfolio-db:
  caddy-data:
  caddy-config: